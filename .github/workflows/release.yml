name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Skip release without tap token
        if: env.TAP_GITHUB_TOKEN == ''
        run: echo "TAP_GITHUB_TOKEN is not set; skipping GoReleaser"
      - uses: goreleaser/goreleaser-action@v7
        if: env.TAP_GITHUB_TOKEN != ''
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ env.TAP_GITHUB_TOKEN }}
